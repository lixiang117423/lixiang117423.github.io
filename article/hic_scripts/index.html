s="hljs-subst">$(date '+%Y-%m-%d %H:%M:%S')</span>] ❌ $*"</span> | <span class="hljs-built_in">tee</span> -a <span class="hljs-variable">${LOG_FILE}</span><br>}<br><br><span class="hljs-comment"># 错误处理函数</span><br><span class="hljs-function"><span class="hljs-title">error_exit</span></span>() {<br>    log_error <span class="hljs-string">"<span class="hljs-variable">$1</span>"</span><br>    log_error <span class="hljs-string">"流程失败，请查看日志: <span class="hljs-variable">${LOG_FILE}</span>"</span><br>    <span class="hljs-built_in">exit</span> 1<br>}<br><br><span class="hljs-comment"># 检查文件是否存在</span><br><span class="hljs-function"><span class="hljs-title">check_file</span></span>() {<br>    <span class="hljs-keyword">if</span> [ ! -f <span class="hljs-string">"<span class="hljs-variable">$1</span>"</span> ]; <span class="hljs-keyword">then</span><br>        error_exit <span class="hljs-string">"文件不存在: <span class="hljs-variable">$1</span>"</span><br>    <span class="hljs-keyword">fi</span><br>}<br><br><span class="hljs-comment"># 检查目录是否存在</span><br><span class="hljs-function"><span class="hljs-title">check_dir</span></span>() {<br>    <span class="hljs-keyword">if</span> [ ! -d <span class="hljs-string">"<span class="hljs-variable">$1</span>"</span> ]; <span class="hljs-keyword">then</span><br>        error_exit <span class="hljs-string">"目录不存在: <span class="hljs-variable">$1</span>"</span><br>    <span class="hljs-keyword">fi</span><br>}<br><br><span class="hljs-comment"># ==============================================================================</span><br><span class="hljs-comment"># 🏁 流程开始</span><br><span class="hljs-comment"># ==============================================================================</span><br><br><span class="hljs-built_in">echo</span> <span class="hljs-string">"╔══════════════════════════════════════════════════════════════════════╗"</span><br><span class="hljs-built_in">echo</span> <span class="hljs-string">"║         🧬 Puzzle Hi-C 基因组组装流程 {PUZZLE_DIR}</span>"</span><br>check_dir <span class="hljs-string">"<span class="hljs-variable">${JUICER_DIR}</span>"</span><br>check_dir <span class="hljs-string">"<span class="hljs-variable">${PUZZLE_CONDA_ENV}</span>"</span><br>log_success <span class="hljs-string">"软件目录检查通过"</span><br><br><span class="hljs-comment"># 设置软件路径</span><br>JUICER_SH=<span class="hljs-string">"<span class="hljs-variable">${JUICER_DIR}</span>/scripts/juicer.sh"</span><br>JUICER_TOOLS=<span class="hljs-string">"<span class="hljs-variable">${JUICER_DIR}</span>/scripts/juicer_tools"</span><br><br><span class="hljs-keyword">if</span> [ ! -f <span class="hljs-string">"<span class="hljs-variable">${JUICER_SH}</span>"</span> ]; <span class="hljs-keyword">then</span><br>    error_exit <span class="hljs-string">"Juicer脚本未找到: <span class="hljs-variable">${JUICER_SH}</span>"</span><br><span class="hljs-keyword">fi</span><br><br><span class="hljs-comment"># 创建目录结构</span><br><span class="hljs-built_in">mkdir</span> -p <span class="hljs-variable">${WORK_DIR}</span>/{references,restriction_sites,fastq,logs,backup}<br>log_success <span class="hljs-string">"目录结构创建完成"</span><br><br><span class="hljs-comment"># ==============================================================================</span><br><span class="hljs-comment"># Step 1: 准备参考基因组和必需文件（参照您的成功脚本）</span><br><span class="hljs-comment"># ==============================================================================</span><br><br>log_info <span class="hljs-string">"[Step 1] 准备参考基因组和必需文件..."</span><br><span class="hljs-built_in">cd</span> <span class="hljs-variable">${WORK_DIR}</span><br><br><span class="hljs-comment"># 1.1 链接基因组文件（Juicer 需要特定文件名）</span><br>GENOME_FA=<span class="hljs-string">"<span class="hljs-variable">${WORK_DIR}</span>/genome.fa"</span><br><span class="hljs-keyword">if</span> [ ! -f <span class="hljs-string">"<span class="hljs-variable">${GENOME_FA}</span>"</span> ]; <span class="hljs-keyword">then</span><br>    <span class="hljs-built_in">ln</span> -s $(<span class="hljs-built_in">readlink</span> -f <span class="hljs-variable">${REF_FASTA}</span>) <span class="hljs-variable">${GENOME_FA}</span><br>    log_success <span class="hljs-string">"基因组文件链接创建: <span class="hljs-variable">${GENOME_FA}</span>"</span><br><span class="hljs-keyword">fi</span><br><br><span class="hljs-comment"># 1.2 构建 BWA 索引</span><br><span class="hljs-keyword">if</span> [ ! -f <span class="hljs-string">"<span class="hljs-variable">${GENOME_FA}</span>.bwt"</span> ]; <span class="hljs-keyword">then</span><br>    log_info <span class="hljs-string">"构建 BWA 索引..."</span><br>    bwa index <span class="hljs-variable">${GENOME_FA}</span> 2&gt;&amp;1 | <span class="hljs-built_in">tee</span> -a <span class="hljs-variable">${LOG_FILE}</span><br>    log_success <span class="hljs-string">"BWA 索引构建完成"</span><br><span class="hljs-keyword">else</span><br>    log_warning <span class="hljs-string">"BWA 索引已存在，跳过"</span><br><span class="hljs-keyword">fi</span><br><br><span class="hljs-comment"># 1.3 生成 chrom.sizes 文件</span><br>CHROM_SIZES=<span class="hljs-string">"<span class="hljs-variable">${WORK_DIR}</span>/references/<span class="hljs-variable">${PROJECT_NAME}</span>.chrom.sizes"</span><br><span class="hljs-keyword">if</span> [ ! -f <span class="hljs-string">"<span class="hljs-variable">${CHROM_SIZES}</span>"</span> ]; <span class="hljs-keyword">then</span><br>    log_info <span class="hljs-string">"生成 chrom.sizes 文件..."</span><br>    samtools faidx <span class="hljs-variable">${GENOME_FA}</span><br>    awk -v OFS=<span class="hljs-string">'\t'</span> <span class="hljs-string">'{print $1, $2}'</span> <span class="hljs-variable">${GENOME_FA}</span>.fai &gt; <span class="hljs-variable">${CHROM_SIZES}</span><br>    <br>    NUM_CHROMS=$(<span class="hljs-built_in">wc</span> -l &lt; <span class="hljs-variable">${CHROM_SIZES}</span>)<br>    log_info <span class="hljs-string">"检测到 <span class="hljs-variable">${NUM_CHROMS}</span> 个序列"</span>
