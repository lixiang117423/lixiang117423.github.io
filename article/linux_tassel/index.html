ljs-variable">$HOME</span>/software/scripts/44.run_tassel.sh"</span><br><br><span class="hljs-comment"># 错误日志文件 (记录失败的表型名称)</span><br>FAIL_LOG=<span class="hljs-string">"<span class="hljs-variable">${WORK_DIR}</span>/failed_phenotypes.txt"</span><br><br><span class="hljs-comment"># ================= 脚本逻辑 =================</span><br><br><span class="hljs-comment"># 1. 进入工作目录</span><br><span class="hljs-keyword">if</span> ! <span class="hljs-built_in">cd</span> <span class="hljs-string">"<span class="hljs-variable">${WORK_DIR}</span>"</span>; <span class="hljs-keyword">then</span><br>    <span class="hljs-built_in">echo</span> <span class="hljs-string">"严重错误: 无法进入工作目录 <span class="hljs-variable">${WORK_DIR}</span>，脚本终止。"</span><br>    <span class="hljs-built_in">exit</span> 1<br><span class="hljs-keyword">fi</span><br><br><span class="hljs-comment"># 初始化/清空错误日志</span><br>: &gt; <span class="hljs-string">"<span class="hljs-variable">${FAIL_LOG}</span>"</span><br><br><span class="hljs-comment"># 2. 获取表型文件的总列数 (基于第一行表头)</span><br>TOTAL_COLS=$(<span class="hljs-built_in">head</span> -n 1 <span class="hljs-string">"<span class="hljs-variable">${PHENO_SOURCE}</span>"</span> | awk <span class="hljs-string">'{print NF}'</span>)<br><br><span class="hljs-built_in">echo</span> <span class="hljs-string">"检测到总列数: <span class="hljs-variable">${TOTAL_COLS}</span>"</span><br><span class="hljs-built_in">echo</span> <span class="hljs-string">"开始遍历处理第 2 列到第 <span class="hljs-variable">${TOTAL_COLS}</span> 列..."</span><br><span class="hljs-built_in">echo</span> <span class="hljs-string">"运行失败的表型将被记录在: <span class="hljs-variable">${FAIL_LOG}</span>"</span><br><br><span class="hljs-comment"># 3. 循环遍历从第2列到最后一列</span><br><span class="hljs-keyword">for</span> (( i=<span class="hljs-number">2</span>; i&lt;=TOTAL_COLS; i++ )); <span class="hljs-keyword">do</span><br>    <br>    <span class="hljs-comment"># 获取当前列的表头名称（作为表型ID和文件夹名）</span><br>    PHENO_NAME=$(<span class="hljs-built_in">head</span> -n 1 <span class="hljs-string">"<span class="hljs-variable">${PHENO_SOURCE}</span>"</span> | awk -v col=<span class="hljs-variable">$i</span> <span class="hljs-string">'{print $col}'</span>)<br>    <br>    <span class="hljs-comment"># 去除名称中可能存在的特殊字符，例如 / 替换为 _</span><br>    DIR_NAME=<span class="hljs-variable">${PHENO_NAME//\//_}</span><br>    <br>    <span class="hljs-built_in">echo</span> <span class="hljs-string">"------------------------------------------------------"</span><br>    <span class="hljs-built_in">echo</span> <span class="hljs-string">"正在处理表型: <span class="hljs-variable">${PHENO_NAME}</span> (列索引: <span class="hljs-variable">$i</span>)"</span><br>    <br>    <span class="hljs-comment"># 创建子文件夹</span><br>    <span class="hljs-keyword">if</span> [ ! -d <span class="hljs-string">"<span class="hljs-variable">${DIR_NAME}</span>"</span> ]; <span class="hljs-keyword">then</span><br>        <span class="hljs-built_in">mkdir</span> -p <span class="hljs-string">"<span class="hljs-variable">${DIR_NAME}</span>"</span><br>    <span class="hljs-keyword">fi</span><br>    <br>    <span class="hljs-comment"># 尝试进入子文件夹 (修改点：失败则跳过本次循环，不退出脚本)</span><br>    <span class="hljs-keyword">if</span> ! <span class="hljs-built_in">cd</span> <span class="hljs-string">"<span class="hljs-variable">${DIR_NAME}</span>"</span>; <span class="hljs-keyword">then</span><br>        <span class="hljs-built_in">echo</span> <span class="hljs-string">"警告: 无法进入目录 <span class="hljs-variable">${DIR_NAME}</span>，跳过该表型。"</span><br>        <span class="hljs-built_in">echo</span> <span class="hljs-string">"<span class="hljs-variable">${PHENO_NAME}</span> (Directory Error)"</span> &gt;&gt; <span class="hljs-string">"<span class="hljs-variable">${FAIL_LOG}</span>"</span><br>        <span class="hljs-built_in">continue</span><br>    <span class="hljs-keyword">fi</span><br>    <br>    <span class="hljs-comment"># 定义提取出来的单个表型文件名</span><br>    SINGLE_PHENO_FILE=<span class="hljs-string">"<span class="hljs-variable">${PHENO_NAME}</span>.pheno.txt"</span><br>    <br>    <span class="hljs-comment"># 提取第1列和第i列</span><br>    <span class="hljs-comment"># 使用 awk 判断是否成功执行</span><br>    awk -v col=<span class="hljs-variable">$i</span> <span class="hljs-string">'BEGIN{OFS="\t"} {print $1, $col}'</span> <span class="hljs-string">"<span class="hljs-variable">${PHENO_SOURCE}</span>"</span> &gt; <span class="hljs-string">"<span class="hljs-variable">${SINGLE_PHENO_FILE}</span>"</span><br>    <br>    <span class="hljs-keyword">if</span> [ $? -ne 0 ]; <span class="hljs-keyword">then</span><br>        <span class="hljs-built_in">echo</span> <span class="hljs-string">"错误: 提取表型数据失败，跳过。"</span><br>        <span class="hljs-built_in">echo</span> <span class="hljs-string">"<span class="hljs-variable">${PHENO_NAME}</span> (Extraction Error)"</span> &gt;&gt; <span class="hljs-string">"<span class="hljs-variable">${FAIL_LOG}</span>"</span><br>        <span class="hljs-built_in">cd</span> .. <span class="hljs-comment"># 返回上一级</span><br>        <span class="hljs-built_in">continue</span><br>    <span class="hljs-keyword">fi</span><br>    <br>    <span class="hljs-comment"># 运行 TASSEL 脚本 (修改点：捕获运行结果)</span><br>    <span class="hljs-built_in">echo</span> <span class="hljs-string">"执行 TASSEL 脚本..."</span><br>    <br>    <span class="hljs-comment"># 这里的 bash 命令被放在 if 条件中</span><br>    <span class="hljs-keyword">if</span> bash <span class="hljs-string">"<span class="hljs-variable">${RUN_SCRIPT}</span>"</span> -i <span class="hljs-string">"<span class="hljs-variable">${VCF_FILE}</span>"</span> -p <span class="hljs-string">"<span class="hljs-variable">${SINGLE_PHENO_FILE}</span>"</span> --keep-temp; <span class="hljs-keyword">then</span><br>        <span class="hljs-built_in">echo</span> <span class="hljs-string">"&gt;&gt;&gt; 表型 <span class="hljs-variable">${PHENO_NAME}</span> 运行成功。"</span><br>    <span class="hljs-keyword">else</span><br>        <span class="hljs-built_in">echo</span> <span class="hljs-string">"&gt;&gt;&gt; 警告: 表型 <span class="hljs-variable">${PHENO_NAME}</span> 运行失败！已记录到日志。"</span><br>        <span class="hljs-comment"># 将失败的表型名称追加写入日志文件</span><br>        <span class="hljs-built_in">echo</span> <span class="hljs-string">"<span class="hljs-variable">${PHENO_NAME}</span>"</span> &gt;&gt; <span class="hljs-string">"<span class="hljs-variable">${FAIL_LOG}</span>"</span><br>        <span class="hljs-comment"># 注意：这里没有 exit，脚本会继续向下运行</span><br>    <span class="hljs-keyword">fi</span><br>    <br>    <span class="hljs-comment"># 返回上一级目录，准备处理下一个</span><br>    <span class="hljs-built_in">cd</span> ..<br>    <br><span class="hljs-keyword">done</span><br><br><span class="hljs-built_in">echo</span> <span class="hljs-string">"======================================================"</span><br><span class="hljs-built_in">echo</span> <span class="hljs-string">"所有表型处理流程结束。"</span><br><span class="hljs-keyword">if</span> [ -s <span class="hljs-string">"<span class="hljs-variable">${FAIL_LOG}</span>"</span> ]; <span class="hljs-keyword">then</span><br>    <span class="hljs-built_in">echo</span> <span class="hljs-string">"以下表型运行失败，请检查 <span class="hljs-variable">${FAIL_LOG}</span> :"</span><br>    <span class="hljs-built_in">cat</span> <span class="hljs-string">"<span class="hljs-variable">${FAIL_LOG}</span>"</span><br><span class="hljs-keyword">else</span><br>    <span class="hljs-built_in">echo</span> <span class="hljs-string">"完美！所有表型均成功运行。"</span><br><span class="hljs-keyword">fi</span><br><span class="hljs-built_in">echo</span> <span class="hljs-string">"======================================================"</span><br></code></pre></td></tr></tbody></table></figure>
